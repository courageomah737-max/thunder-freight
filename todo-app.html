<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }

.container { max-width: 600px; margin: 0 auto; }

.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.todo-item { transition: all 0.2s; }
.todo-item:hover { transform: translateX(5px); }

.todo-item.completed { opacity: 0.6; }
.todo-item.completed .todo-text { text-decoration: line-through; }

.btn-danger:hover { background-color: #dc2626; }
.btn-success:hover { background-color: #16a34a; }
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="text-center mb-8 fade-in">
    <h1 class="text-4xl font-bold text-white mb-2">My To-Do List</h1>
    <p class="text-purple-100">Stay organized and track your tasks</p>
  </div>

  <!-- APP CARD -->
  <div class="bg-white rounded-lg shadow-2xl p-6 fade-in">

    <!-- INPUT SECTION -->
    <div class="flex gap-2 mb-6">
      <input type="text" id="todoInput" placeholder="Add a new task..."
        class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        onkeypress="if(event.key==='Enter') addTodo()">
      <button onclick="addTodo()"
        class="bg-purple-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-purple-700 transition">
        + Add
      </button>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-4 mb-6 text-center">
      <div class="bg-blue-50 p-3 rounded-lg">
        <p class="text-2xl font-bold text-blue-600" id="totalCount">0</p>
        <p class="text-sm text-gray-600">Total</p>
      </div>
      <div class="bg-green-50 p-3 rounded-lg">
        <p class="text-2xl font-bold text-green-600" id="completedCount">0</p>
        <p class="text-sm text-gray-600">Completed</p>
      </div>
      <div class="bg-orange-50 p-3 rounded-lg">
        <p class="text-2xl font-bold text-orange-600" id="pendingCount">0</p>
        <p class="text-sm text-gray-600">Pending</p>
      </div>
    </div>

    <!-- FILTER BUTTONS -->
    <div class="flex gap-2 mb-6">
      <button onclick="filterTodos('all')"
        class="filter-btn flex-1 py-2 rounded-lg font-semibold transition" 
        data-filter="all">
        All
      </button>
      <button onclick="filterTodos('pending')"
        class="filter-btn flex-1 py-2 rounded-lg font-semibold transition" 
        data-filter="pending">
        Pending
      </button>
      <button onclick="filterTodos('completed')"
        class="filter-btn flex-1 py-2 rounded-lg font-semibold transition" 
        data-filter="completed">
        Completed
      </button>
    </div>

    <!-- TODO LIST -->
    <div id="todoList" class="space-y-2 mb-6 max-h-96 overflow-y-auto">
      <!-- Todos rendered here -->
    </div>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="text-center py-8">
      <p class="text-gray-400 text-lg">✨ No tasks yet. Add one to get started!</p>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="flex gap-2 pt-4 border-t">
      <button onclick="clearCompleted()"
        class="flex-1 bg-orange-500 text-white py-2 rounded-lg font-semibold hover:bg-orange-600 transition">
        Clear Completed
      </button>
      <button onclick="clearAll()"
        class="flex-1 bg-red-500 text-white py-2 rounded-lg font-semibold hover:bg-red-600 transition">
        Clear All
      </button>
    </div>

  </div>

</div>

<script>

/* ======================
   STATE MANAGEMENT
====================== */
let state = {
  todos: [],
  filter: 'all'
};

const STORAGE_KEY = 'todoAppState';

/* ======================
   LOAD & SAVE
====================== */
function loadFromStorage() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    state = JSON.parse(saved);
  }
  render();
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

window.onload = loadFromStorage;

/* ======================
   TODO CRUD
====================== */
function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();

  if (!text) return;

  const todo = {
    id: Date.now(),
    text,
    completed: false,
    createdAt: new Date().toLocaleString()
  };

  state.todos.unshift(todo);
  input.value = '';
  saveToStorage();
  render();
}

function toggleTodo(id) {
  const todo = state.todos.find(t => t.id === id);
  if (todo) {
    todo.completed = !todo.completed;
    saveToStorage();
    render();
  }
}

function deleteTodo(id) {
  state.todos = state.todos.filter(t => t.id !== id);
  saveToStorage();
  render();
}

function editTodo(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;

  const newText = prompt('Edit task:', todo.text);
  if (newText && newText.trim()) {
    todo.text = newText.trim();
    saveToStorage();
    render();
  }
}

/* ======================
   FILTERS & ACTIONS
====================== */
function filterTodos(filter) {
  state.filter = filter;
  render();
}

function getFilteredTodos() {
  if (state.filter === 'completed') {
    return state.todos.filter(t => t.completed);
  } else if (state.filter === 'pending') {
    return state.todos.filter(t => !t.completed);
  }
  return state.todos;
}

function clearCompleted() {
  if (confirm('Delete all completed tasks?')) {
    state.todos = state.todos.filter(t => !t.completed);
    saveToStorage();
    render();
  }
}

function clearAll() {
  if (confirm('Delete ALL tasks? This cannot be undone.')) {
    state.todos = [];
    saveToStorage();
    render();
  }
}

/* ======================
   STATS
====================== */
function updateStats() {
  const total = state.todos.length;
  const completed = state.todos.filter(t => t.completed).length;
  const pending = total - completed;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('completedCount').textContent = completed;
  document.getElementById('pendingCount').textContent = pending;
}

/* ======================
   RENDER
====================== */
function render() {
  updateStats();
  renderFilterButtons();
  renderTodos();
}

function renderFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const filter = btn.getAttribute('data-filter');
    if (filter === state.filter) {
      btn.className = 'filter-btn flex-1 py-2 rounded-lg font-semibold transition bg-purple-600 text-white';
    } else {
      btn.className = 'filter-btn flex-1 py-2 rounded-lg font-semibold transition bg-gray-100 text-gray-700 hover:bg-gray-200';
    }
  });
}

function renderTodos() {
  const todoList = document.getElementById('todoList');
  const emptyState = document.getElementById('emptyState');
  const filtered = getFilteredTodos();

  if (filtered.length === 0) {
    todoList.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }

  emptyState.style.display = 'none';

  todoList.innerHTML = filtered.map(todo => `
    <div class="todo-item ${todo.completed ? 'completed' : ''} bg-gray-50 p-4 rounded-lg flex items-center gap-3 group">
      
      <input type="checkbox" ${todo.completed ? 'checked' : ''} 
        onchange="toggleTodo(${todo.id})"
        class="w-5 h-5 cursor-pointer accent-purple-600">
      
      <div class="flex-1">
        <p class="todo-text text-gray-800 font-medium">${escapeHtml(todo.text)}</p>
        <p class="text-xs text-gray-400 mt-1">${todo.createdAt}</p>
      </div>

      <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
        <button onclick="editTodo(${todo.id})"
          class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600 transition">
          Edit
        </button>
        <button onclick="deleteTodo(${todo.id})"
          class="btn-danger bg-red-500 text-white px-3 py-1 rounded text-sm transition">
          Delete
        </button>
      </div>

    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

</script>

</body>
</html>
