<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thunder Freight Truck Marketplace</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; background:#0b0f19; color:white; }

.card { transition:0.2s; }
.card:hover { transform:scale(1.03); }

.page { animation:fade .2s ease; }
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   120+ TRUCK DATASET
========================= */
const brands = ["Ford","Ram","Chevrolet","Toyota","GMC","Nissan"];

const trucks = Array.from({length:120}).map((_,i)=>{
  const brand = brands[i % brands.length];

  return {
    id: brand+"-"+i,
    brand,
    name: brand + " Heavy Truck " + (i+1),
    price: 12000 + i * 500,
    hp: 200 + (i % 350),
    towing: 5000 + (i % 16000),
    engine: "V6 / V8 Turbo",
    img: "https://images.unsplash.com/photo-1601584115197-04ecc0da31d7"
  };
});

/* =========================
   STATE
========================= */
let state = {
  search:"",
  brand:"All",
  maxPrice:80000
};

const app = document.getElementById("app");

/* =========================
   FILTER
========================= */
function filtered(){
  return trucks.filter(t=>
    (state.brand==="All" || t.brand===state.brand) &&
    t.price <= state.maxPrice &&
    t.name.toLowerCase().includes(state.search.toLowerCase())
  );
}

/* =========================
   ROUTER
========================= */
window.onhashchange = router;
window.onload = router;

function router(){
  if(!location.hash || location.hash==="#/") renderHome();
  else renderDetails(location.hash.replace("#/truck/",""));
}

/* =========================
   HOME
========================= */
function renderHome(){

  const data = filtered();
  const brandList = ["All", ...new Set(trucks.map(t=>t.brand))];

  app.innerHTML = `
  <div class="page flex">

    <!-- SIDEBAR -->
    <div class="w-72 bg-gray-900 p-4 hidden md:block">

      <h1 class="text-xl font-bold mb-4">Filters</h1>

      <input placeholder="Search trucks..."
        class="w-full p-2 bg-gray-800 rounded mb-3"
        oninput="state.search=this.value;renderHome()"/>

      <select class="w-full p-2 bg-gray-800 rounded mb-3"
        onchange="state.brand=this.value;renderHome()">
        ${brandList.map(b=>`<option>${b}</option>`).join("")}
      </select>

      <p class="text-sm">Max Price: $${state.maxPrice}</p>

      <input type="range" min="10000" max="80000"
        value="${state.maxPrice}"
        oninput="state.maxPrice=this.value;renderHome()"
        class="w-full"/>

    </div>

    <!-- MAIN -->
    <div class="flex-1">

      <div class="p-6 bg-gradient-to-r from-blue-900 to-gray-900">
        <h1 class="text-3xl font-bold">Thunder Freight Truck.com</h1>
        <p class="text-gray-300">AutoTrader Style Marketplace</p>
      </div>

      <div class="grid md:grid-cols-3 gap-6 p-6">

        ${data.map(t=>`
          <div class="card bg-gray-900 p-4 rounded-xl">

            <img src="${t.img}" class="h-48 w-full object-cover rounded"/>

            <h2 class="font-bold mt-2">${t.name}</h2>
            <p class="text-blue-400">$${t.price.toLocaleString()}</p>

            <p class="text-sm text-gray-400">${t.brand}</p>

            <p class="text-xs text-gray-500 mt-1">
              ${t.engine}
            </p>

            <button onclick="go('${t.id}')"
              class="mt-3 w-full bg-blue-600 py-2 rounded">
              View Details
            </button>

          </div>
        `).join("")}

      </div>
    </div>
  </div>
  `;
}

/* =========================
   DETAILS
========================= */
function renderDetails(id){

  const t = trucks.find(x=>x.id===id);

  app.innerHTML = `
  <div class="page p-6">

    <button onclick="back()"
      class="mb-4 bg-gray-800 px-4 py-2 rounded">
      ← Back
    </button>

    <div class="grid md:grid-cols-2 gap-6">

      <img src="${t.img}" class="rounded-xl"/>

      <div class="bg-gray-900 p-6 rounded-xl">

        <h1 class="text-3xl font-bold">${t.name}</h1>

        <p class="text-blue-400 text-xl">
          $${t.price.toLocaleString()}
        </p>

        <div class="mt-4 space-y-2 text-gray-300">
          <p><b>Brand:</b> ${t.brand}</p>
          <p><b>Engine:</b> ${t.engine}</p>
          <p><b>Horsepower:</b> ${t.hp}</p>
          <p><b>Towing:</b> ${t.towing} lbs</p>
        </div>

      </div>
    </div>
  </div>
  `;
}

/* =========================
   NAV
========================= */
function go(id){
  location.hash = "/truck/" + id;
}
function back(){
  location.hash = "/";
}

</script>

</body>
</html>
